[pytest]
# AltairGO Intelligence — pytest configuration

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
cache_dir = ../../.pytest_cache

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header
    -p no:cacheprovider
    -q

# Custom markers
markers =
    unit: Pure unit tests — no DB, no HTTP
    integration: Tests that hit the Flask test client
    pipeline: Data ingestion pipeline tests
    slow: Tests that take >2 seconds
    engine: Deterministic engine phase tests

# Fail fast on first failure during CI
# Remove -x for full test run
# addopts = -x -v --tb=short
